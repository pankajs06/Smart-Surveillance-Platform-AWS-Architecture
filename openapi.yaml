components:
  schemas:
    Camera:
      type: object
      properties:
        id:
          type: string
          format: uuid
        cameraId:
          type: string
        siteId:
          type: string
        label:
          type: string
        rtspUrl:
          type: string
        status:
          type: string
          enum: [online, offline]
        lastSeen:
          type: string
          format: date-time

    Recording:
      type: object
      properties:
        id:
          type: string
          format: uuid
        cameraId:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        sizeBytes:
          type: integer
        storageUrl:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
